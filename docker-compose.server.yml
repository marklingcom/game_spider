version: "3.8"

services:
  jili-server:
    build:
      context: .
      dockerfile: Dockerfile.server
      no_cache: true
    image: jili-server:latest
    container_name: jili-server
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
