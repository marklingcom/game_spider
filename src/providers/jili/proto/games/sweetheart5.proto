syntax = "proto3";

package customProto;

enum Symbol {
  Wild = 0;
  Bonus = 1;
  Symbol1 = 2;
  Symbol2 = 3;
  Symbol3 = 4;
  Symbol4 = 5;
  Symbol5 = 6;
  Symbol6 = 7;
  Symbol7 = 8;
  Symbol8 = 9;
  Symbol9 = 10;
  WildExtend = 11;
  WildMonkey = 12;
}

message Block {
  uint32 row = 1;
  uint32 column = 2;
}

message Plate {
  repeated ColumnData column = 1;
  repeated AwardReel award = 2;
  double win = 3;
  int32 bonusSymbol = 4;
  double bonusWin = 5;
  uint32 bonusReelCount = 6;

  message AwardReel {
    Symbol symbol = 1;
    uint32 column = 2;
    double win = 3;
    uint32 count = 4;
  }
}

message AllPlate {
  repeated Plate plate = 1;
}

message ColumnData {
  repeated Cell row = 1;
}

message Cell {
  Symbol symbol = 1;
  double value = 2;
  bool isConnect = 3;
}
