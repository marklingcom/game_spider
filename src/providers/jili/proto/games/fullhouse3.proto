syntax = "proto3";

package customProto;

enum Symbol {
  Wild = 0;
  Bonus = 1;
  Symbol1 = 2;
  Symbol2 = 3;
  Symbol3 = 4;
  Symbol4 = 5;
  Symbol5 = 6;
  Symbol6 = 7;
  Symbol7 = 8;
  Symbol8 = 9;
  SymbolMax = 10;
}

message Block {
  uint32 row = 1;
  uint32 column = 2;
}

message Cell {
  Symbol symbol = 1;
  uint32 row = 2;
  uint32 column = 3;
  uint32 isGold = 4;
}

message AwardReel {
  Symbol symbol = 1;
  repeated Block block = 2;
  double win = 3;
}

message Combo {
  repeated Cell change = 1;
  repeated AwardReel award = 2;
  double win = 3;
  uint32 comboBonus = 4;
  repeated Cell extraChange = 5;
  repeated Block goldReplace = 6;
  repeated int32 bigGoldCount = 7;
}

message ColumnData {
  repeated Symbol row = 1;
  repeated uint32 isGold = 2;
}

message Plate {
  repeated ColumnData column = 1;
  repeated Combo combo = 2;
  double win = 3;
  bool isBonus = 4;
  uint32 totalFreeSpin = 5;
}

message AllPlate {
  repeated Plate plate = 1;
}