syntax = "proto3";

package cashcoinProto;

message AwardData {
  int32 Index = 1;
  double Win = 2;
}

message SpecialData {
  int32 Pos = 1;
  int32 SPType = 2;
  int32 Origin = 3;
  int32 Final = 4;
}

message Column {
  repeated string Col = 1;
}

message RoundInfo {
  repeated Column Symbol = 1;
  double RoundWin = 2;
  double Bet = 3;
  repeated AwardData AwardDataVec = 4;
  repeated SpecialData SpeicalVec = 5;
  int32 AwardTypeFlag = 6;
  bool MaxFlag = 7;
}

message SpinAck {
  repeated RoundInfo RoundQueue = 1;
  double TotalWin = 2;
  double RTP = 3;
  int32 LID = 4;
  int32 RID = 5;
  int32 AckType = 6;
}

message GameInfoData {
  int32 LevelUp = 1;
}

message LevelUpInfo {
  int32 LevelUp = 1;
}
