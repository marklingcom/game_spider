syntax = "proto3";

package customProto;

enum Symbol {
  Wild = 0;
  Bonus = 1;
  Symbol1 = 2;
  Symbol2 = 3;
  Symbol3 = 4;
  Symbol4 = 5;
  Symbol5 = 6;
  Symbol6 = 7;
  Symbol7 = 8;
  Symbol8 = 9;
  SymbolMax = 10;
}

message Block {
  uint32 row = 1;
  uint32 column = 2;
}

message Cell {
  int32 symbol = 1;  // Uses Symbol enum
  uint32 row = 2;
  uint32 column = 3;
  uint32 isGold = 4;
  uint32 lastGold = 5;
}

message AwardReel {
  int32 symbol = 1;  // Uses Symbol enum
  repeated Block block = 2;
  double win = 3;
  uint32 bonus = 4;
  uint32 maxLen = 5;
}

message Combo {
  repeated Cell change = 1;
  repeated AwardReel award = 2;
  double win = 3;
  uint32 comboBonus = 4;
  repeated Cell extraChange = 5;
}

message ColumnData {
  repeated int32 row = 1;  // Uses Symbol enum values
  repeated uint32 isGold = 2;
}

message Plate {
  repeated ColumnData column = 1;
  repeated Combo combo = 3;  // Field number jumps from 1 to 3
  double win = 4;
  double bonusWin = 5;
  bool isBonus = 6;
  uint32 totalFreeSpin = 7;
}

message AllPlate {
  repeated Plate plate = 1;
}