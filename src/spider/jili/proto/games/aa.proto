syntax = "proto3";

package aaProto;

message Column {
  repeated int32 Col = 1;
}

message AwardData {
  int32 Symbol = 1;
  int32 Count = 2;
  int32 Line = 3;
  double Win = 4;
}

message RoundInfo {
  repeated Column PlateSymbol = 1;
  repeated AwardData AwardDataVec = 2;
  int32 AwardTypeFlag = 3;
  int32 FreeRemainRound = 4;
  double RoundWin = 5;
  int32 FreeLevel = 6;
  int32 FreeEnergy = 7;
  int32 FreeUpgrade = 8;
  int32 AddFGRound = 9;
  repeated Column PlateSymbolLog = 11;
}

message SpinAck {
  repeated RoundInfo RoundQueue = 1;
  double FreeTotalWin = 2;
  double TotalWin = 3;
  string ShowIndex = 4;
  double NowMoney = 5;
  int32 AckType = 6;
  int32 FreeTotalEnergy = 7;
  double Level4Mul = 8;
  double RTP = 12;
  int32 LID = 13;
  int32 RID = 14;
}

message GameInfoAck {
  repeated double Mul = 6;
  repeated Column FGUpgrade = 9;
}

