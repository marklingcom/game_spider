syntax = "proto3";

package kk2Proto;

// 奖励数据
message AwardData {
  int32 Index = 1;
  int32 Symbol = 2;
  int32 Count = 3;
  double Money = 4;
}

// 列数据（用于 SinglePlate 中的 OriginPlate 和 LastPlate）
message Column {
  repeated int32 Row = 1;
}

// 单盘数据
message SinglePlate {
  repeated Column OriginPlate = 1;
  repeated Column LastPlate = 2;
  repeated AwardData AwardDataList = 3;
  double SingleWin = 4;
  int32 BonusType = 5;
  int32 BonusCount = 6;
}

// 主数据
message MainData {
  SinglePlate MainPlate = 1;
  double MainWin = 2;
  double ScatterWin = 3;
  int32 ScatterCount = 4;
}

// 单次免费游戏数据
message SingleFree {
  SinglePlate FreePlate = 1;
  repeated int32 UpReel = 2;
  int32 PlaneCount = 3;
  int32 MaxRound = 4;
  double FreeMul = 5;
  int32 AwardType = 6;
  double NowMoney = 7;
}

// 免费游戏数据
message FreeData {
  repeated SingleFree FreeQueue = 1;
  double FreeTotalWin = 2;
}

// 旋转响应
message SpinAck {
  MainData MainInfo = 1;
  FreeData FreeInfo = 2;
  double TotalWin = 3;
  int32 AwardType = 4;
  string ShowIndex = 5;
  double NowMoney = 6;
  int32 AckType = 7;
  double RTP = 8;
  int32 LID = 9;
  int32 RID = 10;
}

// 免费游戏计数
message FreeCount {
  repeated int32 SCount = 1;
  repeated double CountMul = 2;
  repeated int32 CountRound = 3;
}

// 游戏信息响应
message GameInfoAck {
  repeated FreeCount FreeData = 1;
}