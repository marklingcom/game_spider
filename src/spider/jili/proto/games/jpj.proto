syntax = "proto3";

package jpjProto;

message Column {
  repeated int32 Row = 1;
}

message Single {
  repeated Column Col = 1;
}

message AwardData {
  int32 Symbol = 1;
  int32 Line = 2;
  double Win = 3;
}

message SpinAck {
  repeated Single PlateSymbol = 1;
  repeated int32 PlateMult = 2;
  repeated AwardData AwardDataVec = 3;
  int32 JpType = 4;
  double JPMul = 5;
  double JPWin = 6;
  double Mult = 7;
  bool Extra = 8;
  bool CanBuy = 14;
  double CanBuyRate = 15;
  int32 ReSpinSymbol = 18;
  int32 ReSpinColumn = 19;
  int32 AwardTypeFlag = 9;
  double TotalWin = 10;
  string ShowIndex = 11;
  double NowMoney = 12;
  int32 AckType = 13;
  bool IsBuy = 17;
  double BaseBet = 20;
  double RTP = 16;
  int32 LID = 21;
  int32 RID = 22;
}

message GameInfoData {
  repeated double BuyMul = 1;
  repeated SingleRange ShowRange = 2;
  repeated double Mul = 3;
}

message SingleRange {
  double Min = 1;
  double Max = 2;
}

message BuyReq {
  double BaseBet = 1;
}

message StateInfo {
  repeated Column Symbol = 1;
  repeated int32 Mul = 2;
  double Buymul = 3;
}