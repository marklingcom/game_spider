syntax = "proto3";

package customProto;

// 符号枚举定义
enum Symbol {
  Wild = 0;
  Bonus = 1;
  Symbol1 = 2;
  Symbol2 = 3;
  Symbol3 = 4;
  Symbol4 = 5;
  Symbol5 = 6;
  Symbol6 = 7;
  Symbol7 = 8;
  Symbol8 = 9;
  Symbol9 = 10;
}

// 区块位置信息
message Block {
  uint32 row = 1;
  uint32 column = 2;
}

// 列数据，包含符号和奖金信息
message ColumnData {
  repeated Symbol row = 1;
  repeated double bonus = 2;
}

// 奖励连线信息
message Plate_AwardReel {
  uint32 line = 1;
  repeated Block block = 2;
  double win = 3;
}

// 盘面信息
message Plate {
  repeated ColumnData column = 1;
  repeated Plate_AwardReel award = 2;
  double win = 3;
  uint32 ballCount = 4;
  double bonusWin = 5;
}

// 所有盘面信息
message AllPlate {
  repeated Plate plate = 1;
}
