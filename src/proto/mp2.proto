syntax = "proto3";
package mp2Proto;

message Column {
  // 未显示在你贴的部分中
}

message Single {
  repeated Column Col = 1;
}

message AwardData {
  int32 Symbol = 1;
  int32 Line = 2;
  double Win = 3;
}

message SpinAck {
  repeated Single PlateSymbol = 1;
  repeated AwardData AwardDataVec = 2;
  int32 AwardTypeFlag = 3;
  double Mult = 4;
  double TotalWin = 5;
  string ShowIndex = 6;
  double NowMoney = 7;
  int32 AckType = 8;
  bool Extra = 9;
  double RTP = 12;
  int32 LID = 13;
  int32 RID = 14;
}
