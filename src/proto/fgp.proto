syntax = "proto3";

package fgpProto;

message Column {
    repeated int32 Col = 1;
}

message AwardData {
    int32 Symbol = 1;
    int32 Line = 2;
    double Win = 3;
}

message SpinAck {
    repeated Column PlateSymbol = 1;
    repeated AwardData AwardDataVec = 2;
    int32 AwardTypeFlag = 3;
    double LineMult = 4;
    double LineWin = 5;
    double WheelOdd = 6;
    double WheelMult = 7;
    double WheelWin = 8;
    double TotalWin = 9;
    repeated double MultShowArray = 10;
    repeated int32 LightOnPos = 11;
    double Bet = 12;
    bool Extra = 13;
    bool IsBonus = 17;
    string ShowIndex = 14;
    double NowMoney = 15;
    int32 AckType = 16;
}

message GameInfoData {
    repeated double Mul = 6;
    repeated double WheelOdds = 9;
}