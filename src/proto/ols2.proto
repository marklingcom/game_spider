syntax = "proto3";

package ols2Proto;

message SpinAck {
  int32 Award = 1;
  repeated int32 PlateSymbol = 2;
  int32 RespinTimes = 3;
  double Mult = 4;
  double PlateWin = 5;
  double MultWin = 6;
  double ExtraWin = 7;
  double RespinWin = 8;
  double TotalWin = 9;
  string ShowIndex = 10;
  double NowMoney = 11;
  int32 AckType = 12;
}

message GameInfoData {
  repeated double OddList = 7;
  double OddFactor = 8;
}