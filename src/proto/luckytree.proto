syntax = "proto3";

package luckytreeProto;

// 单条线奖励
message Award {
  int32 AwardTypeFlag = 1;
  int32 AwardSymbol   = 2;
  int32 AwardLine     = 3;
  double Win          = 4;
}

// 普通转动盘面数据
message PlateData {
  repeated int32 HitPosVec     = 1; // 中奖位置
  repeated int32 LuckyTreeVec  = 2; // lucky tree 符号位置
  repeated Award AwardVec      = 3; // 奖励
  repeated int32 Plate         = 4; // 盘面符号
  double WinMoney              = 5;
  int32 AwardTypeFlag          = 6;
  int32 FreeGameTime           = 7;
}

// 免费游戏数据
message FreeGameData {
  repeated PlateData PlateDataVec = 1;
  double TotalWin                 = 2;
  int32 TotalTimes                = 3;
  int32 BeginTimes                = 4;
}

// bonus 命中记录
message BonusHitRecord {
  int32 Sym      = 1;
  int32 HitCount = 2;
}

// bonus 奖励明细
message BonusAwardDetail {
  int32 Symbol = 1;
  int32 Count  = 2;
  double Win   = 3;
}

// bonus 奖励（按颜色分组）
message BonusAward {
  int32 ColorId = 1;
  repeated BonusAwardDetail AwardDetail = 2;
}

// bonus 游戏数据
message BonusGameData {
  int32 TotalRound                 = 1;
  double Bet                       = 2;
  repeated BonusHitRecord HitRecord = 3;
  repeated int32 Other              = 4;
  double TotalWin                   = 5;
  repeated int32 HitCount           = 6;
  repeated double HitCountWin       = 7;
}
