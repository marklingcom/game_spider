syntax = "proto3";

package tksProto;

// Award 消息 - 单个奖励
message Award {
  int32 AwardMode = 1;    // 奖励模式
  int32 AwardItem = 2;    // 奖励项目
  int32 Side = 3;         // 侧面/位置
  int32 LineIndex = 4;    // 线路索引
  double Odds = 5;        // 赔率/倍数
}

// AwardData 消息 - 奖励数据
message AwardData {
  repeated Award Award = 1;  // 奖励列表
  double AwardPrize = 2;     // 奖励奖金
  bool IsFreeGame = 3;       // 是否免费游戏
}

// FreeGamePlateInfo 消息 - 免费游戏盘子信息
message FreeGamePlateInfo {
  repeated int32 Plate = 1;          // 盘子数据
  AwardData AwardData = 2;           // 奖励数据
}

// FreeGameData 消息 - 免费游戏数据
message FreeGameData {
  repeated FreeGamePlateInfo FreeGamePlateInfo = 1;  // 免费游戏盘子信息列表
  double TotalPrize = 2;            // 总奖金
  int32 Times = 3;                  // 次数
  int32 BeginTimes = 4;             // 开始次数
  bool PackageFinish = 5;           // 包完成
  string LogIndex = 6;              // 日志索引
  string ShowIndex = 7;             // 显示索引
}

// FreeGameSet 消息 - 免费游戏设置
message FreeGameSet {
  int32 LineMode = 1;               // 线路模式
  int32 FreeGameTimes = 2;          // 免费游戏次数
}

// GameInfoAck 消息 - 游戏信息响应
message GameInfoAck {
  bool IsHighRateMode = 1;          // 是否高倍率模式
  double HighRateBet = 2;           // 高倍率投注
}

// StateInfo 消息 - 状态信息
message StateInfo {
  double PreBet = 1;                // 前次投注
  int32 RemainHighRateRound = 2;    // 剩余高倍率回合
  int32 Spec1Count = 3;             // 特殊1计数
  int32 Spec2Count = 4;             // 特殊2计数
  int32 Spec3Count = 5;             // 特殊3计数
  int32 Spec4Count = 6;             // 特殊4计数
}

// SpinAck 消息 - 旋转响应
message SpinAck {
  repeated int32 Plate = 1;         // 盘子数据
  AwardData AwardData = 2;          // 奖励数据
  double MGWin = 3;                 // MG赢奖
  repeated FreeGameData FreeGamePackage = 4;  // 免费游戏包
  bool NowMode = 5;                 // 当前模式
  bool IsHighRateMode = 6;          // 是否高倍率模式
  int32 GameType = 7;               // 游戏类型
  double TotalWin = 8;              // 总赢奖
  int32 AwardType = 9;              // 奖励类型
  string ShowIndex = 10;            // 显示索引
  double NowMoney = 11;             // 当前金额
  int32 AckType = 12;               // 响应类型
  double RTP = 13;                  // RTP值
  int32 LID = 14;                   // 左ID
  int32 RID = 15;                   // 右ID
}
