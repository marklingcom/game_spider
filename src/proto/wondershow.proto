syntax = "proto3";

package customProto;

enum Symbol {
  Wild = 0;
  Free = 1;
  Symbol1 = 2;
  Symbol2 = 3;
  Symbol3 = 4;
  Symbol4 = 5;
  Symbol5 = 6;
  Symbol6 = 7;
  Symbol7 = 8;
  Symbol8 = 9;
  Symbol9 = 10;
}

message Block {
  uint32 row = 1;
  uint32 column = 2;
}

message Plate {
  message AwardReel {
    uint32 line = 1;
    repeated Block block = 2;
    double win = 3;
  }

  repeated Row column = 1;
  repeated AwardReel award = 2;
  double win = 3;
}

message Row {
  repeated Symbol row = 1;
  repeated double bonus = 2;
}

message AllPlate {
  repeated Plate plate = 1;
}