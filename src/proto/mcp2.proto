syntax = "proto3";

package mcp2Proto;

message SinglePlate {
  repeated int32 Symbol = 1;
}

message SpinAck {
  repeated SinglePlate PlateSymbol = 1;
  repeated SinglePlate PlateWinUp = 2;
  double MainWin = 3;
  double ReSpinWin = 4;
  double WheelWin = 5;
  double TotalWin = 6;
  int32 ShowType = 7;
  int32 AckType = 8;
  double RTP = 9;
  int32 LID = 10;
  int32 RID = 11;
}

message GameInfoData {
  repeated Wheel WheelList = 1;
  repeated double AllBetList = 2;
  BetSymbol BetMap = 3;
  int32 WinUp = 4;
}

message Wheel {
  repeated double Mul = 1;
}

message BetSymbol {
  repeated SingleBetSymbol BetSymbolMap = 1;
}

message SingleBetSymbol {
  double Bet = 1;
  repeated int32 Column1 = 2;
  repeated int32 Column2 = 3;
  repeated int32 Column3 = 4;
  repeated int32 Column4 = 5;
}
