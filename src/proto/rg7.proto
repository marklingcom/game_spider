syntax = "proto3";

package rg7proto;

// 列数据
message Column {
  repeated int32 Col = 1;
}

// 奖励数据
message AwardData {
  int32 Symbol = 1;
  int32 Count = 2;
  int32 Line = 3;
  double Mult = 4;
  double Win = 5;
}

// 单个盘面
message SinglePlate {
  repeated Column PlateSymbol = 1;
  double Win = 3;
}

// 回合信息
message RoundInfo {
  repeated SinglePlate PlateVec = 1;
  int32 SwitchResult = 2;
  int32 WildResult = 3;
  int32 AwardTypeFlag = 4;
  double RoundWin = 5;
  double GemWin = 6;
  double LineWin = 7;
  bool MaxFlag = 8;
  repeated int32 Nudge = 9;
  repeated AwardData AwardDataVec = 10;
}

// 旋转响应
message SpinAck {
  repeated RoundInfo RoundQueue = 1;
  double TotalWin = 2;
  double RTP = 3;
  double Bet = 4;
}

// 游戏信息数据
message GameInfoData {
  bool ShowExtra = 1;
  repeated double Mul = 2;
  repeated double showOddTable = 3;
}
